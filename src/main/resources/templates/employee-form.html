<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="sidebar">
    <h2>EMS</h2>
    <a th:href="@{/employees}">Dashboard</a>
    <a th:href="@{/logout}">Logout</a>
</div>

<div class="main">
    <div class="card">
        <h2>Employee Form</h2>

        <form th:action="@{/employees}" th:object="${employee}" method="post">
            <input type="text" th:field="*{name}" placeholder="Name" required>
            <input type="email" th:field="*{email}" placeholder="Email" required>
            <input type="text" th:field="*{department}" placeholder="Department" required>
            <input type="number" th:field="*{salary}" placeholder="Salary" required>

            <button type="submit" class="btn btn-primary">Save Employee</button>
        </form>
    </div>
</div>

</body>
</html>
